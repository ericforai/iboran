services:
  app:
    image: node:20-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app
    command: sh -c "npm run dev"
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - DATABASE_URI=mongodb://mongo:27017/iboran

  mongo:
    image: mongo:7
    platform: linux/amd64
    ports:
      - '27018:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
  node_modules:
