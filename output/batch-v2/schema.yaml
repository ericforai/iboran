    format: "h2+list"
  - id: comparison
    h2: "对比分析"
    required_fields:
      - "kb.comparison_rows"
    format: "h2+table"
  - id: faq
    h2: "常见问题"
    required_fields:
      - "kb.faq_items"
    format: "h2+qa"

