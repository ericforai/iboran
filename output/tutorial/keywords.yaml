generator:
  method: python
  python_pseudocode: |-
    # 关键词组合生成逻辑
    from itertools import product

    # 定义各维度枚举值
        industry_values = ["制造业", "零售业", "服务业", "物流", "医药", "食品", "化工", "电子", "汽车", "纺织"]  # 示例值，实际应包含所有枚举
        scenario_values = ["集团管控", "多组织", "业财一体化", "产销一体化", "财务共享", "供应链协同", "移动办公", "智能分析"]  # 示例值，实际应包含所有枚举

    # 生成所有维度组合
    combinations = product(industry_values, scenario_values)

    # 生成关键词列表
    keywords = []
    for combo in combinations:
        # 组合方式：维度值1 + 维度值2 + ... + 种子关键词
        keyword_parts = [str(v) for v in combo if v]  # 过滤空值
        keyword = "".join(keyword_parts) + "实施服务"  # 可根据需要调整组合方式
        keywords.append(keyword)

    # 去重和排序
    keywords = sorted(set(keywords))

    # 输出结果
    for kw in keywords:
        print(kw)
