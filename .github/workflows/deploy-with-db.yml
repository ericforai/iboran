name: Do Not Use - Deprecated Database Sync Deploy

on:
  workflow_dispatch:

jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - name: Stop
        run: |
          echo "This workflow is intentionally disabled."
          echo "Do not deploy by uploading .next/standalone or syncing databases from CI."
          echo "Use the GitHub workflow 'Deploy to Aliyun ECS (Docker)' instead."
          exit 1
