name: Deploy to Aliyun ECS (Docker)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable pnpm && pnpm -v

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit --pretty false

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync source to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.next' \
            --exclude='node_modules' \
            --exclude='.pnpm-store' \
            --exclude='tmp' \
            --exclude='backups' \
            --exclude='*.log' \
            --exclude='*.tar' \
            --exclude='*.tar.gz' \
            --exclude='*.zip' \
            ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/iboran/"

      - name: Build and restart on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" <<'ENDSSH'
          set -euo pipefail
          cd /opt/iboran
          docker build --network host \
            --build-arg NEXT_PUBLIC_SERVER_URL=https://www.iboran.com \
            -t iboran-app:latest \
            .
          docker compose -f docker-compose.prod.yml up -d --no-build app
          sleep 8
          curl -fsSI https://www.iboran.com/ >/dev/null
          curl -fsSI https://www.iboran.com/posts >/dev/null
          curl -fsSI https://www.iboran.com/assets/images/boran-logo.png >/dev/null
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
